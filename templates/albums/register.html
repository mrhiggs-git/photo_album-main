{% extends 'base.html' %}

{% block content %}
<div class="max-w-md mx-auto py-12">
    <div class="text-center mb-10">
        <h1 class="text-4xl font-extrabold text-gray-900 tracking-tight">Join LensFlow</h1>
        <p class="text-gray-500 mt-2">Start organizing your photography today.</p>
    </div>
    <div class="bg-white p-8 rounded-3xl shadow-xl border border-gray-100">
        <form method="post" class="django-form">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-bold text-lg shadow-lg shadow-indigo-100 hover:bg-indigo-700 hover:-translate-y-0.5 transition-all">
                Create Account
            </button>
        </form>
        <p class="text-center mt-6 text-sm text-gray-500">
            Already have an account? <a href="{% url 'login' %}" class="text-indigo-600 font-semibold hover:underline">Log in</a>
        </p>
    </div>
</div>
{% endblock %}
