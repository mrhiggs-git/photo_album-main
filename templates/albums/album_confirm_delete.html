{% extends 'base.html' %}

{% block content %}
<div class="max-w-lg mx-auto py-20 text-center">
    <div class="bg-white p-10 rounded-3xl shadow-2xl border border-red-50">
        <div class="w-20 h-20 bg-red-100 text-red-600 rounded-full flex items-center justify-center mx-auto mb-6">
            <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
        </div>
        <h1 class="text-2xl font-bold text-gray-900 mb-2">Delete Album?</h1>
        <p class="text-gray-500 mb-8">Are you sure you want to delete <span class="font-semibold text-gray-900">"{{ object.title }}"</span>? This action is permanent and will delete all photos inside.</p>
        <form method="post" class="flex flex-col gap-3">
            {% csrf_token %}
            <button type="submit" class="w-full bg-red-600 text-white py-4 rounded-2xl font-bold hover:bg-red-700 transition">Yes, Delete Everything</button>
            <a href="{% url 'album-detail' object.pk %}" class="w-full bg-gray-100 text-gray-600 py-4 rounded-2xl font-bold hover:bg-gray-200 transition">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
