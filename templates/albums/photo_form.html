{% extends 'base.html' %}

{% block content %}
<div class="max-w-2xl mx-auto">
    <div class="bg-white rounded-3xl shadow-xl border border-gray-100 overflow-hidden">
        <div class="p-8 border-b border-gray-50 bg-indigo-50/30">
            <h1 class="text-2xl font-bold text-gray-900">Upload to {{ album.title }}</h1>
            <p class="text-indigo-600/70 font-medium text-sm">Add a new memory to this collection.</p>
        </div>
        <form method="post" enctype="multipart/form-data" class="p-8 django-form">
            {% csrf_token %}
            {{ form.as_p }}
            <div class="mt-8 flex items-center justify-between">
                <p class="text-xs text-gray-400">Supported formats: JPG, PNG, WEBP</p>
                <div class="flex items-center gap-4">
                    <a href="{% url 'album-detail' album.pk %}" class="text-sm font-semibold text-gray-500 hover:text-gray-700">Back</a>
                    <button type="submit" class="bg-indigo-600 text-white px-8 py-3 rounded-xl font-bold shadow-lg shadow-indigo-200 hover:bg-indigo-700 transition">
                        Upload Photo
                    </button>
                </div>
            </div>
        </form>
    </div>
</div>
{% endblock %}
