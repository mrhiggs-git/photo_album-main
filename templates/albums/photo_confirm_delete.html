{% extends 'albums/base.html' %}
{% block title %}Delete Photo{% endblock %}
{% block content %}
<div style="max-width:480px;margin:60px auto;background:#fff;padding:32px;border-radius:10px;box-shadow:0 2px 12px rgba(0,0,0,.08);text-align:center">
  <p style="font-size:48px">🗑️</p>
  <h2 style="margin:16px 0 8px">Delete this photo?</h2>
  {% if object.image %}
    <img src="{{ object.image.url }}" style="width:100%;max-height:200px;object-fit:cover;border-radius:8px;margin-bottom:16px" alt="photo">
  {% endif %}
  <p style="color:#666;margin-bottom:24px">This action cannot be undone.</p>
  <form method="post" style="display:flex;gap:10px;justify-content:center">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Yes, delete it</button>
    <a href="{% url 'album-detail' object.album.pk %}" class="btn btn-outline">Cancel</a>
  </form>
</div>
{% endblock %}
