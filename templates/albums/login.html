{% extends 'base.html' %}

{% block content %}
<div class="max-w-md mx-auto py-12">
    <div class="text-center mb-10">
        <h1 class="text-4xl font-extrabold text-gray-900 tracking-tight">Welcome Back</h1>
        <p class="text-gray-500 mt-2">Log in to your LensFlow account.</p>
    </div>
    <div class="bg-white p-8 rounded-3xl shadow-xl border border-gray-100">
        <form method="post" class="django-form">
            {% csrf_token %}
            {% if form.non_field_errors %}
                <div class="mb-4 p-3 bg-red-50 border border-red-100 text-red-600 text-sm rounded-xl">
                    {% for error in form.non_field_errors %}
                        {{ error }}
                    {% endfor %}
                </div>
            {% endif %}
            
            {{ form.as_p }}
            
            <button type="submit" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-bold text-lg shadow-lg shadow-indigo-100 hover:bg-indigo-700 hover:-translate-y-0.5 transition-all mt-2">
                Sign In
            </button>
        </form>
        <p class="text-center mt-6 text-sm text-gray-500">
            New here? <a href="{% url 'register' %}" class="text-indigo-600 font-semibold hover:underline">Create an account</a>
        </p>
    </div>
</div>
{% endblock %}
